services:
  - type: web
    name: mathbank-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false  # you'll fill this in after deploying frontend
      - key: DATABASE_URL
        fromDatabase:
          name: mathbank-db
          property: connectionString

databases:
  - name: mathbank-db
    plan: free
    region: oregon
